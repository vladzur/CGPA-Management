name: Release — Deploy to Production

on:
  push:
    tags:
      - 'v*.*.*'   # triggers on semantic version tags, e.g. v1.2.3

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Tests & Coverage gate ───────────────────────────────────────────────
  test:
    name: Unit Tests & Coverage (≥80%)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install
        working-directory: .

      - name: Run tests with coverage
        run: pnpm test:cov --ci

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.ref_name }}
          path: apps/api/coverage/
          retention-days: 30

  # ── 2. Deploy Frontend to Firebase Hosting (live channel) ─────────────────
  deploy_frontend:
    name: Deploy Frontend → Firebase Hosting (live)
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install & build
        run: pnpm install && pnpm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CGPA_LICEO_AGB }}
          channelId: live
          projectId: cgpa-liceo-agb

  # ── 3. Deploy Backend to Cloud Run ────────────────────────────────────────
  deploy_backend:
    name: Deploy Backend → Cloud Run
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Deploy to Cloud Run
        run: |
          # Cloud Run traffic tags only allow lowercase letters, numbers and hyphens.
          # Semver dots (v1.0.0) must be converted → v1-0-0
          SAFE_TAG=$(echo "${{ github.ref_name }}" | tr '.' '-' | tr '[:upper:]' '[:lower:]')
          gcloud run deploy api \
            --source . \
            --region southamerica-west1 \
            --allow-unauthenticated \
            --quiet \
            --tag "$SAFE_TAG"
